groups:
  - name: hancock_availability
    interval: 30s
    rules:
      # ── Error rate ─────────────────────────────────────────────────────────
      - alert: HancockHighErrorRate
        expr: |
          (
            sum(rate(hancock_errors_total[5m]))
            /
            sum(rate(hancock_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
          service: hancock
        annotations:
          summary: "Hancock error rate > 5%"
          description: >
            The error rate for Hancock API is {{ printf "%.1f" (mul 100 $value) }}%,
            which exceeds the 5% threshold.

      - alert: HancockCriticalErrorRate
        expr: |
          (
            sum(rate(hancock_errors_total[5m]))
            /
            sum(rate(hancock_requests_total[5m]))
          ) > 0.20
        for: 1m
        labels:
          severity: critical
          service: hancock
        annotations:
          summary: "Hancock error rate > 20% — CRITICAL"
          description: >
            Error rate is {{ printf "%.1f" (mul 100 $value) }}%.
            Immediate investigation required.

      # ── Memory / process health ────────────────────────────────────────────
      - alert: HancockMemoryLeak
        expr: |
          (
            process_resident_memory_bytes{job="hancock"}
            - process_resident_memory_bytes{job="hancock"} offset 30m
          ) / process_resident_memory_bytes{job="hancock"} offset 30m > 0.25
        for: 10m
        labels:
          severity: warning
          service: hancock
        annotations:
          summary: "Hancock memory grew >25% in 30 minutes"
          description: >
            RSS memory has grown {{ printf "%.1f" (mul 100 $value) }}% in the
            last 30 minutes.  Possible memory leak — check rate-limiter state
            and streaming generator cleanup.

      # ── No traffic (dead-man switch) ──────────────────────────────────────
      - alert: HancockNoTraffic
        expr: |
          sum(rate(hancock_requests_total[10m])) == 0
        for: 10m
        labels:
          severity: info
          service: hancock
        annotations:
          summary: "Hancock has received no requests for 10 minutes"
          description: >
            No requests recorded in the last 10 minutes.
            Verify the service is running and receiving traffic.
