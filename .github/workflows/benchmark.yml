name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run benchmark suite
        id: bench
        run: |
          python tests/benchmark_suite.py --n 30 2>&1 | tee /tmp/bench_output.txt
          echo "bench_output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/bench_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run pytest benchmark tests
        run: |
          pytest tests/benchmark_suite.py tests/test_performance.py -v 2>&1 | tee /tmp/bench_pytest.txt

      - name: Comment benchmark results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/bench_output.txt', 'utf8');
            const pytest = fs.readFileSync('/tmp/bench_pytest.txt', 'utf8');
            const body = [
              '## 📊 Benchmark Results',
              '',
              '### Endpoint latency (30 requests per endpoint, mocked backend)',
              '```',
              output,
              '```',
              '',
              '### Performance regression tests',
              '```',
              pytest.slice(-3000),
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
