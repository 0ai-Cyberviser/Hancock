name: Claude Code

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  claude-code-review:
    name: Claude Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Claude Code analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Starting Claude Code analysis..."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Event: ${{ github.event_name }}"

          # Check if Claude Code CLI is available
          if command -v claude &> /dev/null; then
            echo "✅ Claude Code CLI found"
            # Run basic code analysis
            claude analyze --format json --output claude-analysis.json . || true
          else
            echo "⚠️  Claude Code CLI not found - skipping detailed analysis"
            echo "💡 To enable full Claude Code integration, install the Claude CLI"
          fi

      - name: Static analysis with flake8
        run: |
          echo "🔍 Running flake8 critical checks..."
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics . || true

      - name: Code quality checks
        run: |
          echo "📊 Running code quality analysis..."
          # Check for common security issues
          if [ -f "qa/security_audit.py" ]; then
            python qa/security_audit.py || true
          fi

          # Check documentation consistency
          if [ -f "qa/docs_lint.py" ]; then
            python qa/docs_lint.py || true
          fi

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-analysis
          path: |
            claude-analysis.json
            *.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🤖 Claude Code Analysis\n\n';
            comment += '✅ Automated code analysis completed successfully.\n\n';
            comment += '### Quick Stats\n';
            comment += `- **Repository**: ${context.repo.owner}/${context.repo.repo}\n`;
            comment += `- **Branch**: ${context.payload.pull_request.head.ref}\n`;
            comment += `- **Commit**: ${context.sha.substring(0, 7)}\n\n`;
            comment += '💡 Review the workflow artifacts for detailed analysis results.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
