name: Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint — critical first-party Python errors only (E9, F63, F7, F82)
        run: |
          python - <<'PY' > /tmp/flake8-first-party-files.txt
          from pathlib import Path

          excluded_parts = {
              ".git", ".github", ".venv", "venv", "__pycache__", "build",
              "dist", "htmlcov", ".pytest_cache", ".mypy_cache", "projects",
              "tgrok", "whoosh-reloaded", "fastapi", "pydantic",
          }
          excluded_prefixes = {Path("tests") / "fixtures"}

          for path in sorted(Path(".").rglob("*.py")):
              if any(part in excluded_parts for part in path.parts):
                  continue
              if any(path == prefix or prefix in path.parents for prefix in excluded_prefixes):
                  continue
              print(path.as_posix())
          PY
          if [ ! -s /tmp/flake8-first-party-files.txt ]; then
            echo "No first-party Python files discovered for critical flake8 lint."
            exit 1
          fi
          xargs -a /tmp/flake8-first-party-files.txt flake8 --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Docs backend/endpoint consistency lint
        run: python qa/docs_lint.py

      - name: Contract tests (fail on API drift)
        run: pytest tests/test_api_contract.py -q --maxfail=1

      - name: Run tests
        run: pytest tests/ -q
