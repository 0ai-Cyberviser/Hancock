name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v \
            --ignore=tests/load_test_locust.py \
            --ignore=tests/benchmark_suite.py

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            cyberviser/hancock:latest
            cyberviser/hancock:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            LOG=$(git log --oneline -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag     = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const body    = [
              `## Hancock ${tag}`,
              '',
              '### What\'s Changed',
              '${{ steps.changelog.outputs.CHANGELOG }}',
              '',
              '### Docker',
              '```bash',
              `docker pull cyberviser/hancock:${version}`,
              '```',
            ].join('\n');
            await github.rest.repos.createRelease({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              tag_name: tag,
              name:    `Hancock ${tag}`,
              body,
              draft:   false,
              prerelease: tag.includes('-'),
            });
