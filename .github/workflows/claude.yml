name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only run when @claude is mentioned
    if: contains(github.event.comment.body, '@claude')
    concurrency:
      group: claude-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: >-
            Bash(pip install -r requirements.txt),
            Bash(pip install -r requirements-dev.txt),
            Bash(flake8 --count --select=E9,F63,F7,F82 --show-source --statistics .),
            Bash(pytest tests/ -q --tb=short),
            Bash(pytest tests/ -v --tb=short),
            Bash(python qa/docs_lint.py)
