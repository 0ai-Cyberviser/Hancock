name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # weekly on Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── SAST — Bandit ──────────────────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: |
          bandit -r . \
            --exclude .venv,node_modules,hancock-cpu-adapter,tests,deploy/helm \
            -f json -o /tmp/bandit-report.json -ll || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: /tmp/bandit-report.json

  # ── Dependency check ───────────────────────────────────────────────────────
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies
        run: pip-audit --desc --skip-editable -f json -o /tmp/pip-audit.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: /tmp/pip-audit.json

  # ── Container scan — Trivy ─────────────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t hancock:scan -f Dockerfile .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "hancock:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
