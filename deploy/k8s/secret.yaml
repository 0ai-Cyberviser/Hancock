apiVersion: v1
kind: Secret
metadata:
  name: hancock-secrets
  labels:
    app: hancock
type: Opaque
# WARNING: Do NOT commit real API keys.
# Populate via: kubectl create secret generic hancock-secrets --from-env-file=.env
# Or use an external secret manager (Vault, AWS Secrets Manager, etc.)
stringData:
  NVIDIA_API_KEY: "REPLACE_WITH_REAL_KEY"
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY"
  HANCOCK_WEBHOOK_SECRET: "REPLACE_WITH_REAL_SECRET"
  HANCOCK_SLACK_WEBHOOK: ""
  HANCOCK_TEAMS_WEBHOOK: ""
